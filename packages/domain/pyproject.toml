[project]
name = "aero-cert-domain"
version = "0.1.0"
description = "Shared domain models and ontology for Aerospace Certification Intelligence Platform"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/domain"]

[tool.ruff]
line-length = 100
target-version = "py311"
